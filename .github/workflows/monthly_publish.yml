name: Monthly Publish

"on":
  schedule:
    - cron: "15 3 1 * *"
  workflow_dispatch:

jobs:
  monthly-publish:
    if: github.ref_name != 'logs'
    runs-on:
      - self-hosted
      - Linux
      - X64
    permissions:
      actions: write
      contents: write
      id-token: write
      issues: write
    env:
      PUBLISH_ENABLED: ${{ vars.PUBLISH_ENABLED || 'true' }}
      PUBLISH_MODE: ${{ vars.PUBLISH_MODE || 'core_major' }}
      RELEASE_CHANNEL: production
      PRODUCTION_PROFILE: binance_only_core_major_monthly
      DOWNLOAD_TOP_LIQUID: ${{ vars.DOWNLOAD_TOP_LIQUID || '90' }}
      FIRESTORE_COLLECTION: ${{ vars.FIRESTORE_COLLECTION || 'strategy' }}
      FIRESTORE_DOCUMENT: ${{ vars.FIRESTORE_DOCUMENT || 'CRYPTO_LEADER_ROTATION_LIVE_POOL' }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCS_BUCKET: ${{ vars.GCS_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate To Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          REQ_FILE="requirements-lock.txt"
          if [ ! -f "${REQ_FILE}" ]; then REQ_FILE="requirements.txt"; fi
          pip install -r "${REQ_FILE}"

      - name: Download Or Update Raw History
        run: python scripts/download_history.py --top-liquid "${DOWNLOAD_TOP_LIQUID}" --force-exchange-info

      - name: Build Production v1 Live Pool And Shadow Tracks
        run: |
          python scripts/run_monthly_shadow_build.py \
            --universe-mode "${PUBLISH_MODE}" \
            --shadow-universe-mode "${PUBLISH_MODE}" \
            --skip-publish-dry-run

      - name: Publish Production v1 Release
        run: python scripts/publish_release.py --mode "${PUBLISH_MODE}"

      - name: Write Release Status Summary
        run: python scripts/run_release_status_summary.py

      - name: Write Monthly Review Briefing
        run: python scripts/run_monthly_review_briefing.py

      - name: Write Monthly Telegram Preview
        run: python scripts/run_monthly_build_telegram.py --print-only --output-path data/output/monthly_telegram.txt

      - name: Assemble Monthly Report Bundle
        id: monthly-report
        run: |
          set -euo pipefail
          python scripts/run_monthly_report_bundle.py
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open("data/output/monthly_report_bundle/monthly_report_bundle.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)
          print(f"artifact_name={payload['artifact_name']}")
          PY

      - name: Append Monthly Report Job Summary
        run: cat data/output/monthly_report_bundle/job_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Monthly Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.monthly-report.outputs.artifact_name }}
          path: data/output/monthly_report_bundle
          if-no-files-found: error
          retention-days: 7

      - name: Create Monthly Review Issue
        if: success() && env.PUBLISH_ENABLED != 'false'
        id: review_issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_OUTPUT: ${{ github.output }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          
          token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "crypto-leader-rotation-monthly-publish",
          }
          api_base = f"https://api.github.com/repos/{repository}"
          label_name = "monthly-review"
          label_path = urllib.parse.quote(label_name, safe="")
          
          with open("data/output/monthly_report_bundle/monthly_report_bundle.json", "r", encoding="utf-8") as handle:
              bundle = json.load(handle)
          with open("data/output/monthly_report_bundle/ai_review_input.md", "r", encoding="utf-8") as handle:
              issue_body = handle.read()
          
          def request_json(method: str, url: str, payload: dict | None = None) -> dict:
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(url, data=data, method=method, headers=headers)
              with urllib.request.urlopen(request) as response:
                  body = response.read().decode("utf-8")
              return json.loads(body) if body else {}
          
          try:
              request_json("GET", f"{api_base}/labels/{label_path}")
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              request_json(
                  "POST",
                  f"{api_base}/labels",
                  {
                      "name": label_name,
                      "description": "Automated monthly report AI review",
                      "color": "0E8A16",
                  },
              )
          
          issue = request_json(
              "POST",
              f"{api_base}/issues",
              {
                  "title": f"Monthly Report Review: {bundle['as_of_date']}",
                  "labels": [label_name],
                  "body": issue_body,
              },
          )
          print(f"Created issue #{issue['number']}: {issue['html_url']}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"issue_number={issue['number']}", file=output)
              print(f"issue_url={issue['html_url']}", file=output)
          PY

      - name: Trigger AI Monthly Review
        if: success() && env.PUBLISH_ENABLED != 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ISSUE_NUMBER: ${{ steps.review_issue.outputs.issue_number }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          issue_number = os.environ["ISSUE_NUMBER"]
          payload = {"ref": ref_name, "inputs": {"issue_number": issue_number}}
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/actions/workflows/ai_review.yml/dispatches",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "crypto-leader-rotation-monthly-publish",
              },
          )
          with urllib.request.urlopen(request) as response:
              if response.status not in (201, 204):
                  raise RuntimeError(f"Unexpected dispatch status: {response.status}")
          print(f"Triggered ai_review.yml for issue #{issue_number} on ref {ref_name}")
          PY

      - name: Write Release Heartbeat
        if: success() && env.PUBLISH_ENABLED != 'false'
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: python scripts/write_release_heartbeat.py --manifest data/output/release_manifest.json --output-dir data/output/heartbeat

      - name: Push Heartbeat To Logs Branch
        if: success() && env.PUBLISH_ENABLED != 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOGS_BRANCH: logs
        run: |
          set -euo pipefail
          VERSION=$(python - <<'PY'
          import json
          print(json.load(open("data/output/release_manifest.json"))["version"])
          PY
          )
          HEARTBEAT_FILE="${GITHUB_WORKSPACE}/data/output/heartbeat/monthly/${VERSION}.json"
          TMP_DIR="$(mktemp -d)"
          git clone --no-checkout "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${TMP_DIR}/logs-repo"
          cd "${TMP_DIR}/logs-repo"

          if git ls-remote --exit-code --heads origin "${LOGS_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${LOGS_BRANCH}:${LOGS_BRANCH}"
            git checkout "${LOGS_BRANCH}"
          else
            git checkout --orphan "${LOGS_BRANCH}"
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          mkdir -p monthly
          cp "${HEARTBEAT_FILE}" "monthly/${VERSION}.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "monthly/${VERSION}.json"
          if git diff --cached --quiet; then
            echo "No heartbeat changes to commit."
            exit 0
          fi
          git commit -m "heartbeat: ${VERSION}"
          git push origin "HEAD:${LOGS_BRANCH}"
